<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Travel Landing</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #0a3f3f;
  color: white;
}

/* TOP NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 10%;
  align-items: center;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
  opacity: 0.8;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 60px 10%;
  gap: 40px;
}

/* LEFT */
.hero-text {
  max-width: 450px;
}

.hero-text h1 {
  font-size: 60px;
  line-height: 1;
}

.hero-text h1 span {
  color: #00e6c3;
}

.hero-text p {
  margin-top: 15px;
  opacity: 0.7;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 20px;
  background: #00e6c3;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* RIGHT IMAGE */
.hero-img {
  width: 600px;
  height: 400px;
  border-radius: 20px;
  background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover;
  position: relative;
  overflow: hidden;
}

/* DARK OVERLAY */
.hero-img::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.6));
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: white;
  color: black;
  border-radius: 15px;
  width: 180px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.card p {
  padding: 10px;
  font-size: 14px;
}

/* SOCIAL */
.social {
  position: absolute;
  left: 30px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div><b>Travel</b></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Destination</a>
    <a href="#">Blog</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- SOCIAL -->
<div class="social">
  <div>FB</div>
  <div>IG</div>
  <div>TW</div>
</div>

<!-- HERO -->
<div class="hero">

  <!-- LEFT -->
  <div class="hero-text">
    <h1>Explore <span>Dream</span> Destination</h1>
    <p>
      Discover amazing places, travel the world and enjoy unforgettable adventures.
    </p>

    <button class="btn">Book Now</button>

    <!-- CARDS -->
    <div class="cards">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
        <p>Mountain View</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
        <p>Beach Paradise</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1528127269322-539801943592">
        <p>City Lights</p>
      </div>

    </div>
  </div>

  <!-- RIGHT -->
  <div class="hero-img"></div>

</div>

</body>
</html>
